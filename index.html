<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">

<style>
:root{
  --bg:#00162b;--bg2:#002b4a;--panel:#052f52;--card:rgba(4,43,74,.76);
  --line:rgba(105,188,245,.24);--text:#f4f8ff;--muted:#b4c6d6;
  --accent:#1598e8;--accent2:#63c9ff;--chip:#0b67a3;--gold:#e6bf74;
  --green:#5aa35c;--orange:#d48a23;--red:#ff7676;--shadow:rgba(0,0,0,.28);
}
body[data-theme=basalte]{
  --bg:#11110f;--bg2:#1f1f1b;--panel:#1b1b18;--card:rgba(35,34,30,.72);
  --line:rgba(255,255,255,.13);--text:#f4f1ea;--muted:#aaa39a;
  --accent:#d0ab73;--accent2:#d8c098;--chip:#3a3329;--gold:#d8c098;
  --green:#6d8b62;--orange:#c28b45;--red:#d47a66;--shadow:rgba(0,0,0,.36);
}
*{box-sizing:border-box}
html{background:var(--bg)}
body{
  margin:0;min-height:100vh;color:var(--text);
  font-family:"Helvetica Neue",Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:
    radial-gradient(circle at 78% 0%,color-mix(in srgb,var(--accent2) 14%,transparent),transparent 28%),
    linear-gradient(160deg,var(--bg) 0%,var(--bg2) 48%,var(--bg) 100%);
}
body[data-theme=basalte]{
  background:
    radial-gradient(circle at 78% 0%,rgba(216,192,152,.12),transparent 28%),
    linear-gradient(160deg,#0f0f0d 0%,#1e1e1a 45%,#11110f 100%);
}
button,input,select,textarea{font:inherit}
.app{width:min(100%,560px);margin:auto;padding:12px 14px 84px}
.top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px}
h1{
  margin:4px 0 0;font-family:"Times New Roman",Georgia,serif;font-weight:400;
  font-size:clamp(34px,8vw,46px);line-height:.95;letter-spacing:-.055em
}
.sub{margin:5px 0 0;color:var(--muted);font-size:13px}
.menuRound{
  width:44px;height:44px;border-radius:50%;border:1px solid var(--line);
  background:color-mix(in srgb,var(--panel) 70%,transparent);color:var(--text);
  font-size:21px;box-shadow:0 14px 30px var(--shadow)
}
.notice{
  width:100%;text-align:left;color:var(--text);
  margin:13px 0 10px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 76%,transparent);
  border-radius:20px;padding:10px 13px;font-size:13.5px;line-height:1.35;box-shadow:0 12px 24px rgba(0,0,0,.10)
}
.notice.hasDue::after{content:"›";float:right;color:var(--muted);font-size:24px;line-height:16px}
.searchRow{display:grid;grid-template-columns:1fr 46px;gap:8px;margin:10px 0 13px}
input,select,textarea{border:1px solid var(--line);background:color-mix(in srgb,var(--bg) 80%,#000);color:var(--text);outline:none}
.search{height:46px;border-radius:22px;padding:0 18px;font-size:13px}
.search::placeholder{color:var(--muted)}
.add{
  height:46px;border:1px solid var(--line);border-radius:50%;
  background:linear-gradient(160deg,var(--accent),color-mix(in srgb,var(--accent) 55%,#000));
  color:white;font-size:28px;box-shadow:0 14px 30px var(--shadow)
}
body[data-theme=basalte] .add{color:#15120f}
.statusLine{
  display:flex;align-items:center;justify-content:space-between;gap:6px;
  border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 58%,transparent);
  border-radius:18px;padding:7px 10px;margin:0 0 16px
}
.statBtn{
  border:0;background:transparent;color:var(--text);white-space:nowrap;border-radius:13px;
  padding:6px 8px;font-size:14.5px
}
.statBtn.active{background:color-mix(in srgb,var(--accent) 25%,transparent)}
.statBtn b{color:var(--accent2);margin-left:8px}
.divider{width:1px;height:17px;background:var(--line)}
.sectionHead{display:flex;align-items:center;justify-content:space-between;gap:8px;margin:10px 0 9px}
.titleWrap{display:flex;align-items:baseline;gap:9px;min-width:0}
h2{
  margin:0;font-family:"Times New Roman",Georgia,serif;font-weight:400;
  font-size:29px;line-height:1;letter-spacing:-.035em
}
.count{color:var(--muted);font-size:17px;font-family:"Times New Roman",Georgia,serif}
.sort{height:30px;border-radius:17px;padding:0 10px;border:0;background:transparent;color:var(--text);font-size:13px}
.list{display:grid;gap:8px}
.book{
  position:relative;border:1px solid var(--line);background:var(--card);
  border-radius:16px;padding:9px 10px;box-shadow:0 10px 22px var(--shadow);overflow:hidden
}
.book::before{content:"";position:absolute;left:0;top:12px;bottom:12px;width:3px;border-radius:9px;background:transparent}
.book.borrowed::before{background:var(--green)}
.book.hold::before{background:var(--orange)}
.row{display:grid;grid-template-columns:74px 1fr 28px;gap:10px;align-items:center}
.cover{
  width:74px;height:110px;border-radius:10px;background:linear-gradient(145deg,var(--bg),var(--accent));
  display:grid;place-items:center;text-align:center;padding:8px;color:var(--gold);font-family:Georgia,serif;
  font-size:10.5px;line-height:1.12;overflow:hidden;box-shadow:0 8px 18px rgba(0,0,0,.28)
}
.cover img{width:100%;height:100%;object-fit:cover}
.info{min-width:0}
.bookTitle{font-size:18px;font-weight:750;line-height:1.16;letter-spacing:-.025em;overflow-wrap:anywhere}
.author{font-size:12.5px;color:var(--muted);margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chips{display:flex;gap:7px;flex-wrap:wrap;margin-top:8px;align-items:center}
.chip{background:var(--chip);color:white;border-radius:10px;padding:5px 8px;font-size:12.5px;line-height:1}
body[data-theme=basalte] .chip{color:var(--text)}
.chip.soft{background:color-mix(in srgb,var(--panel) 68%,transparent);color:var(--text)}
.dueText{font-size:12.5px;color:var(--muted);margin-top:8px}
.dueText .soon{color:var(--accent2);font-weight:750}
.dueText .late{color:var(--red);font-weight:750}
.progressRow{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin-top:9px}
.bar{
  height:5px;background:color-mix(in srgb,var(--muted) 16%,transparent);
  border-radius:99px;overflow:hidden
}
.bar span{
  display:block;height:100%;width:var(--p);
  background:linear-gradient(90deg,var(--accent2),color-mix(in srgb,var(--accent2) 70%,white));
  border-radius:99px
}
body[data-theme=basalte] .bar span{background:linear-gradient(90deg,#d0ab73,#efd3a2)}
.percent{font-weight:750;font-size:14px;color:var(--text)}
.dots{border:0;background:transparent;color:var(--text);font-size:24px;line-height:1;height:30px;align-self:start}
.collapsed{margin-top:18px;display:grid;gap:8px}
.collapseRow{
  border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 76%,transparent);
  border-radius:16px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between
}
.collapseRow strong{font-size:21px;letter-spacing:-.035em}
.collapseRow span{background:color-mix(in srgb,var(--accent) 35%,transparent);padding:6px 11px;border-radius:99px;font-size:14px}
.empty{padding:28px;text-align:center;color:var(--muted);border:1px solid var(--line);border-radius:20px;background:var(--card)}
.footer{text-align:center;color:var(--muted);margin-top:24px;font-size:13px}
.nav{
  position:fixed;left:50%;bottom:8px;transform:translateX(-50%);
  width:min(calc(100% - 20px),536px);display:grid;grid-template-columns:repeat(4,1fr);
  gap:6px;padding:8px;background:color-mix(in srgb,var(--bg) 90%,transparent);
  border:1px solid var(--line);border-radius:24px;backdrop-filter:blur(12px);
  box-shadow:0 16px 38px rgba(0,0,0,.35);z-index:20
}
.nav button{border:0;background:transparent;color:var(--muted);border-radius:17px;height:46px;font-size:17px;display:grid;place-items:center}
.nav button small{font-size:10.5px;margin-top:-5px}
.nav button.active{background:color-mix(in srgb,var(--accent) 82%,transparent);color:white}
body[data-theme=basalte] .nav button.active{color:#15120f}
.scrim{
  position:fixed;inset:0;display:none;z-index:26;
  background:rgba(0,8,18,.48);backdrop-filter:blur(4px)
}
.scrim.open{display:block}
.addMenu{
  position:fixed;right:18px;top:265px;display:none;z-index:28;border-radius:20px;padding:8px;width:255px;
  border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 40px rgba(0,0,0,.36)
}
.addMenu.open{display:block}
.addMenu button{
  width:100%;height:44px;border:0;background:transparent;color:var(--text);
  text-align:left;padding:0 12px;border-radius:13px;font-size:16px
}
.addMenu button:hover{background:color-mix(in srgb,var(--accent) 35%,transparent)}
.addMenu button + button{border-top:1px solid var(--line);border-radius:0;margin-top:4px;padding-top:4px}
.menu,.bookMenu{
  position:fixed;right:14px;display:none;z-index:25;border-radius:20px;padding:8px;width:240px;
  border:1px solid var(--line);background:var(--panel);box-shadow:0 18px 40px rgba(0,0,0,.36)
}
.menu{bottom:76px}.bookMenu{top:35%;right:20px}
.menu.open,.bookMenu.open{display:block}
.menu button,.bookMenu button{width:100%;height:42px;border:0;background:transparent;color:var(--text);text-align:left;padding:0 12px;border-radius:13px}
.menu button:hover,.bookMenu button:hover{background:color-mix(in srgb,var(--accent) 35%,transparent)}
.danger{color:#ffb0b0!important}.themeTitle{color:var(--muted);font-size:12px;padding:8px 12px 4px;text-transform:uppercase;letter-spacing:.16em;border-top:1px solid var(--line);margin-top:6px}
dialog{border:0;border-radius:24px;padding:0;max-width:520px;width:calc(100% - 24px);background:var(--panel);color:var(--text)}
dialog::backdrop{background:rgba(0,10,22,.68)}
.modal{padding:18px;border:1px solid var(--line);border-radius:24px;max-height:88vh;overflow:auto;background:var(--panel)}
.modal h2{font-size:26px;margin:0 0 13px}
.form{display:grid;gap:11px}
label span{display:block;margin-bottom:6px;color:var(--muted);font-size:14px}
.modal input,.modal select,.modal textarea{width:100%;border-radius:14px;padding:11px;font-size:14px}
textarea{min-height:72px}
.preview{display:flex;gap:11px;align-items:center}
.previewBox{width:64px;height:94px;border-radius:11px;background:var(--bg);border:1px solid var(--line);display:grid;place-items:center;overflow:hidden;color:var(--muted);font-size:12px;text-align:center}
.previewBox img{width:100%;height:100%;object-fit:cover}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-top:14px}
.btn{height:42px;border-radius:20px;padding:0 12px;border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 80%,#000);color:var(--text)}
.primary{background:var(--accent)!important;color:white}
body[data-theme=basalte] .primary{color:#15120f}
.results{display:grid;gap:8px;margin-top:8px}
.result{display:grid;grid-template-columns:52px 1fr;gap:12px;align-items:center;border:1px solid var(--line);background:var(--card);border-radius:16px;padding:10px}
.rcover{width:52px;height:76px;border-radius:8px;background:var(--bg);display:grid;place-items:center;overflow:hidden;color:var(--muted);font-size:10px;text-align:center}
.rcover img{width:100%;height:100%;object-fit:cover}
.rtitle{font-weight:780;line-height:1.18}.rmeta{color:var(--muted);font-size:13px;margin-top:4px}
.loading{color:var(--muted);text-align:center;padding:18px}
.resultGroupTitle{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin:14px 4px 4px}
.statsGroup{display:grid;gap:8px;margin-top:10px}
.statsGroupTitle{color:var(--muted);font-size:12px;text-transform:uppercase;letter-spacing:.14em;margin:16px 4px 6px}
.statsSelect{width:100%;height:42px;border-radius:16px;padding:0 12px;margin-bottom:12px}
.statsHeroImg{
  width:100%;border-radius:16px;overflow:hidden;position:relative;margin-bottom:14px;
  aspect-ratio:16/9;background:linear-gradient(160deg,#001828,#0a2a4a)
}
.statsHeroImg img{width:100%;height:100%;object-fit:cover;display:block;border-radius:16px}
.statsHeroImg .heroText{
  position:absolute;bottom:0;left:0;right:0;padding:18px 20px;
  background:linear-gradient(0deg,rgba(0,10,22,.82) 0%,transparent 100%);
  border-radius:0 0 16px 16px
}
.statsHeroImg .heroText h3{
  margin:0 0 3px;font-family:"Times New Roman",Georgia,serif;font-weight:400;
  font-size:24px;color:#fff;letter-spacing:-.03em
}
.statsHeroImg .heroText p{margin:0;font-size:13px;color:rgba(255,255,255,.7)}
.statsRow{
  display:flex;align-items:center;gap:14px;
  border:1px solid var(--line);background:color-mix(in srgb,var(--panel) 76%,transparent);
  border-radius:16px;padding:13px 16px;cursor:default
}
.statsRow .statsRowIcon{
  width:38px;height:38px;border-radius:50%;
  background:color-mix(in srgb,var(--accent) 22%,transparent);
  display:grid;place-items:center;font-size:18px;flex-shrink:0
}
.statsRow .statsRowIcon span{
  font-family:Georgia,"Times New Roman",serif;
  font-weight:800;
  font-size:16px;
  color:var(--accent2)
}
.statsRow .statsRowLabel{flex:1;font-size:16px}
.statsRow .statsRowCount{
  background:color-mix(in srgb,var(--accent) 28%,transparent);
  color:var(--accent2);font-size:14px;font-weight:700;
  border-radius:99px;padding:4px 11px;min-width:28px;text-align:center
}
.statsHero{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:18px;text-align:center;margin-bottom:10px}
.statsHero .big{font-family:"Times New Roman",Georgia,serif;font-size:54px;line-height:.9;letter-spacing:-.06em}
.statsHero .label{color:var(--muted);font-size:13px;margin-top:6px}

@media(max-width:390px){
  .app{padding-left:13px;padding-right:13px}
  .row{grid-template-columns:76px 1fr 28px}.cover{width:76px;height:112px}.bookTitle{font-size:13px}.search{font-size:13px}.statusLine{font-size:13px}
}
</style>
</head>
<body data-theme="coastal">
<div class="app">
  <div class="top">
    <div>
      <h1>Hallo Tina 👋</h1>
      <p class="sub">Schön, dass du hier bist.</p>
    </div>
  </div>

  <button class="notice" id="notice" onclick="openNextDue()" title="Zur nächsten Fälligkeit"></button>

  <div class="searchRow">
    <input class="search" id="q" placeholder="Suche in deiner Bibliothek..." oninput="render()">
    <button class="add" onclick="openAddMenu()">＋</button>
  </div>

  <div class="statusLine">
    <button class="statBtn active" data-stat="Lesend" onclick="setView('Lesend')">Lesen <b id="nReading">0</b></button>

    <button class="statBtn" data-stat="Ausgeliehen" onclick="setView('Ausgeliehen')">Ausgeliehen <b id="nBorrowed">0</b></button>

  </div>

  <section>
    <div class="sectionHead">
      <div class="titleWrap"><h2 id="viewTitle">Lesend</h2><span class="count" id="count">0</span></div>

    </div>
    <div class="list" id="books"></div>
    <div class="collapsed" id="collapsed"></div>
  </section>

  <div class="footer">Daten und Design werden lokal gespeichert.</div>
</div>

<nav class="nav">
  <button data-nav="Alle" onclick="setView('Alle')">📖<small>Alle Bücher</small></button>
  <button data-nav="Gelesen" onclick="setView('Gelesen')">✓<small>Gelesen</small></button>

<div class="menu" id="mainMenu">

  <button onclick="showStats();closeMenus()">📊 Statistik</button>
  <button onclick="exportData();closeMenus()">⇧ Daten exportieren</button>
  <button onclick="importData();closeMenus()">⇩ Daten importieren</button>

  <button onclick="setTheme('coastal')">🌊 Cobalt Blue</button>
  <button onclick="setTheme('basalte')">◼ Basalte Dark</button>
</div>

<div class="scrim" id="scrim" onclick="closeMenus()"></div>

<div class="addMenu" id="addMenu">

  <button onclick="openForm();closeMenus()">＋ Manuell hinzufügen</button>
</div>

<div class="bookMenu" id="bookMenu">

  <button id="markReadBtn" onclick="markRead()">✓ Als gelesen markieren</button>

<dialog id="bookDialog"><div class="modal">
  <h2 id="modalTitle">Buch hinzufügen</h2>

    <label><span>Besitz / Nutzung</span><select id="fAccess"></select></label>

  </div>

<dialog id="searchDialog"><div class="modal">
  <h2>Buch suchen</h2>
  <div class="form">
    <label><span>Titel, Autor oder ISBN</span><input id="olQuery" placeholder="z.B. Dire Bound"></label>
    <button class="btn primary" onclick="searchOL()">Suchen</button>
  </div>
  <div id="olResults" class="results"></div>
  <div class="actions"><button class="btn" onclick="searchDialog.close()">Schließen</button></div>
</div></dialog>


<dialog id="statsDialog"><div class="modal">
  <h2>Lesestatistik</h2>
  <select id="statsYear" class="statsSelect" onchange="renderStats()"></select>
  <div id="statsContent"></div>
  <div class="actions"><button class="btn" onclick="statsDialog.close()">Schließen</button></div>
</div></dialog>

<dialog id="statusDialog"><div class="modal">
  <h2 id="statusDialogTitle">Status ändern</h2>
  <div class="form"><label><span id="statusDialogLabel">Neuer Status</span><select id="newStatus"></select></label></div>
  <div class="actions"><button class="btn" onclick="statusDialog.close()">Abbrechen</button><button class="btn primary" onclick="saveStatus()">Speichern</button></div>
</div></dialog>

function openDB(){
  return new Promise((resolve,reject)=>{
    const req=indexedDB.open("tinas_lesecockpit_db",1);
    req.onupgradeneeded=e=>{
      const db=e.target.result;
      if(!db.objectStoreNames.contains("store")) db.createObjectStore("store");
    };
    req.onsuccess=e=>resolve(e.target.result);
    req.onerror=e=>reject(e.target.error);
  });
}

async function idbSet(key,value){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("store","readwrite");
    tx.objectStore("store").put(value,key);
    tx.oncomplete=()=>resolve();
    tx.onerror=e=>reject(e.target.error);
  });
}

async function idbGet(key){
  const db=await openDB();
  return new Promise((resolve,reject)=>{
    const tx=db.transaction("store","readonly");
    const req=tx.objectStore("store").get(key);
    req.onsuccess=()=>resolve(req.result);
    req.onerror=e=>reject(e.target.error);
  });
}

async function loadBooks(){
  try{
    const fromIDB=await idbGet(STORE);
    if(Array.isArray(fromIDB)) return fromIDB;
  }catch(e){}
  try{
    const fromLS=JSON.parse(localStorage.getItem(STORE)||"null");
    if(Array.isArray(fromLS)) return fromLS;
    if(fromLS && Array.isArray(fromLS.books)) return fromLS.books;
  }catch(e){}
  return SEED_BOOKS;
}

function esc(s){return String(s||"").replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]))}
function days(s){if(!s)return null;let t=new Date();t.setHours(0,0,0,0);return Math.ceil((new Date(s+"T00:00:00")-t)/86400000)}
function de(s){return s?new Date(s+"T00:00:00").toLocaleDateString("de-DE"):"—"}
function dueText(b){let d=days(b.dueDate);if(d===null)return"";if(d<0)return"überfällig";if(d===0)return"heute";if(d===1)return"morgen";return`in ${d} Tagen`}
function holdWeeksLeft(b){
  if(!b.waitWeeks) return null;
  const total = Number(b.waitWeeks);
  if(!total && total !== 0) return null;
  const start = b.waitStart ? new Date(b.waitStart + "T00:00:00") : null;
  if(!start) return total;
  let t = new Date(); t.setHours(0,0,0,0);
  const elapsedWeeks = Math.max(0, Math.floor((t - start) / (7 * 86400000)));
  return Math.max(0, total - elapsedWeeks);
}
function pct(r){let m=String(r||"").match(/(\d+)/);return m?Math.min(100,+m[1]):0}
function cov(b){return b.cover?`<img src="${b.cover}">`:esc(b.title.split(" ").slice(0,4).join(" "))}

        updated.dueDate="";

function readFileAsText(file){
  if(file.text) return file.text();
  return new Promise((resolve,reject)=>{
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result);
    reader.onerror = () => reject(reader.error || new Error("Datei konnte nicht gelesen werden"));
    reader.readAsText(file);
  });
}

function normalizeSource(source){
  if(["Kindle","Queens Public Library","Bibliotheksverbund Berlin","Stadtbibliothek Stuttgart","Eigenes EPUB","Sonstiges"].includes(source)){
    return source;
  }
  if(source==="Stadtbibliothek Berlin") return "Bibliotheksverbund Berlin";
  return "Sonstiges";
}

function normalizeBook(b){
  const normalized = {
    id: b.id || crypto.randomUUID(),
    title: b.title || "",
    author: b.author || "",
    status: b.status || "TBR",
    startedDate: b.startedDate || "",
    finishedDate: b.finishedDate || "",
    source: normalizeSource(b.source || "Sonstiges"),
    access: b.access || "Sonstiges",
    dueDate: b.dueDate || "",
    dueMode: b.dueMode || (b.access==="Ausgeliehen" ? "date" : "hidden"),
    rating: b.rating || "",
    waitWeeks: b.waitWeeks || "",
    waitStart: b.waitStart || "",
    notes: b.notes || "",
    cover: b.cover || "",
    loanCount: b.loanCount || (b.access==="Ausgeliehen" ? 1 : 0)
  };

  if(normalized.access==="Wunschliste"){
    normalized.status="Wunschliste";
    normalized.access="Sonstiges";
  }

  if(!["Ausgeliehen","Vorgemerkt","Gekauft","Eigenes Buch","Sonstiges","Zurückgegeben"].includes(normalized.access)){
    normalized.access="Sonstiges";
  }

  if(normalized.status==="TBR" && normalized.access==="Sonstiges"){
    normalized.status="Wunschliste";
  }

  return normalized;
}

function importData(){
  let input=document.createElement("input");
  input.type="file";
  input.accept="application/json";

  input.onchange=async e=>{
    let file=e.target.files && e.target.files[0];
    if(!file)return;

    try{
      let raw = await readFileAsText(file);
      let d = JSON.parse(raw);
      let imported = Array.isArray(d) ? d : d.books;

      if(!Array.isArray(imported)){
        throw new Error("Keine Bücherliste im Backup gefunden.");
      }

      data = imported.map(normalizeBook);

      if(d && d.theme){
        document.body.dataset.theme=d.theme;
        localStorage.setItem(THEME,d.theme);
      }

      await idbSet(STORE, JSON.parse(JSON.stringify(data)));

      try{
        localStorage.setItem(STORE, JSON.stringify(data));
      }catch(e){
        // Backup mit Covern ist für localStorage zu groß; IndexedDB wurde erfolgreich genutzt.
      }

      render();
      alert(`Import erfolgreich: ${data.length} Bücher geladen.`);
    }catch(err){
      alert("Import fehlgeschlagen: " + (err && err.message ? err.message : err));
    }
  };

  input.click();
}

async function searchOpenLibrary(query){
  const res = await fetch(`https://openlibrary.org/search.json?q=${encodeURIComponent(query)}&limit=10&fields=title,author_name,first_publish_year,cover_i,isbn`);
  if(!res.ok) throw new Error("Open Library nicht erreichbar");
  const json = await res.json();
  return (json.docs || []).slice(0,8).map(d=>({
    title:d.title || "",
    author:d.author_name?.[0] || "",
    year:d.first_publish_year || "",
    cover:d.cover_i ? `https://covers.openlibrary.org/b/id/${d.cover_i}-L.jpg` : (d.isbn?.length ? `https://covers.openlibrary.org/b/isbn/${d.isbn[0]}-L.jpg` : ""),
    sourceApi:"Open Library"
  })).filter(x=>x.title);
}

async function searchOL(){
  let query=olQuery.value.trim();
  if(!query){
    olResults.innerHTML='<div class="loading">Bitte Suchbegriff eingeben.</div>';
    return;
  }

  olResults.innerHTML='<div class="loading">Suche bei Open Library …</div>';

  try{
    results = await searchOpenLibrary(query);
  }catch(e){
    results = [];
  }

  olResults.innerHTML = results.length
    ? results.map((b,i)=>`<div class="result" onclick="useResult(${i})"><div class="rcover">${b.cover?`<img src="${b.cover}">`:"Kein Cover"}</div><div><div class="rtitle">${esc(b.title)}</div><div class="rmeta">${esc(b.author||"Autor/in offen")}${b.year?` · ${esc(b.year)}`:""} · Open Library</div></div></div>`).join("")
    : '<div class="loading">Keine Treffer bei Open Library gefunden.</div>';
}

function useResult(i){let b=results[i];if(!b)return;searchDialog.close();openForm();fTitle.value=b.title;fAuthor.value=b.author;cover=b.cover;updatePreview()}


function getBookYear(b){
  if(b.finishedDate) return new Date(b.finishedDate+"T00:00:00").getFullYear();
  return null;
}

function statYears(){
  const years = new Set();
  data.forEach(b=>{
    const y = getBookYear(b);
    if(y) years.add(y);
  });
  years.add(new Date().getFullYear());
  return Array.from(years).sort((a,b)=>b-a);
}

function setupStatsYears(){
  const years = statYears();
  const current = statsYear.value;
  statsYear.innerHTML = years.map(y=>`<option value="${y}">${y}</option>`).join("");
  statsYear.value = years.includes(Number(current)) ? current : String(years[0]);
}

function countForYear(year, predicate){
  return data.filter(b => getBookYear(b) === year && predicate(b)).length;
}

function libraryIcon(name){
  if(name==="Queens Public Library") return "Q";
  if(name==="Bibliotheksverbund Berlin") return "B";
  if(name==="Stadtbibliothek Stuttgart") return "🏛️";
  if(name==="Onleihe") return "O";
  if(name==="Kindle") return "K";
  if(name==="Libby") return "L";
  return "B";
}

function renderStats(){
  const year = Number(statsYear.value || new Date().getFullYear());
  const finishedBooks = data.filter(b => b.status==="Gelesen" && b.finishedDate && getBookYear(b)===year);

  const readCount = finishedBooks.length;
  const borrowedCount = countForYear(year, b => b.access==="Ausgeliehen");
  const boughtCount = countForYear(year, b => ["Gekauft","Eigenes Buch"].includes(b.access));

  const libraryCounts = {
    "Queens Public Library": 0,
    "Bibliotheksverbund Berlin": 0,
    "Stadtbibliothek Stuttgart": 0
  };

  finishedBooks.forEach(b=>{
    if(b.source==="Queens Public Library") libraryCounts["Queens Public Library"]++;
    else if(b.source==="Bibliotheksverbund Berlin" || b.source==="Stadtbibliothek Berlin") libraryCounts["Bibliotheksverbund Berlin"]++;
    else if(b.source==="Stadtbibliothek Stuttgart") libraryCounts["Stadtbibliothek Stuttgart"]++;
  });

  const libraryRows = Object.entries(libraryCounts)
    .sort((a,b)=>b[1]-a[1] || a[0].localeCompare(b[0]))
    .map(([name,count])=>{
      const icon = libraryIcon(name);
      return `<div class="statsRow">
        <div class="statsRowIcon"><span>${icon}</span></div>
        <div class="statsRowLabel">${esc(name)}</div>
        <div class="statsRowCount">${count}</div>
      </div>`;
    })
    .join("");

  statsContent.innerHTML = `
    <div class="statsHeroImg">
      <img src="${HERO_IMG}" alt="Lesereise" loading="lazy">
      <div class="heroText">
        <h3>Deine Lesereise</h3>
        <p>Jedes Buch eine neue Welt.</p>
      </div>
    </div>

    <div class="statsHero">
      <div class="big">${readCount}</div>
      <div class="label">Gelesene Bücher</div>
    </div>

    <div class="statsGroupTitle">Aktivität</div>
    <div class="statsGroup">
      <div class="statsRow">
        <div class="statsRowIcon">📖</div>
        <div class="statsRowLabel">Gelesen</div>
        <div class="statsRowCount">${readCount}</div>
      </div>
      <div class="statsRow">
        <div class="statsRowIcon">🏛️</div>
        <div class="statsRowLabel">Ausgeliehen</div>
        <div class="statsRowCount">${borrowedCount}</div>
      </div>
      <div class="statsRow">
        <div class="statsRowIcon">🛒</div>
        <div class="statsRowLabel">Gekauft / Eigenes Buch</div>
        <div class="statsRowCount">${boughtCount}</div>
      </div>
    </div>

    <div class="statsGroupTitle">Bibliotheksnutzung</div>
    <div class="statsGroup">
      ${libraryRows}
    </div>
  `;
}

function showStats(){
  setupStatsYears();
  renderStats();
  statsDialog.showModal();
}

document.addEventListener("click",e=>{if(!e.target.closest(".menu")&&!e.target.closest(".nav"))mainMenu.classList.remove("open");if(!e.target.closest(".addMenu")&&!e.target.closest(".add")&&!e.target.closest(".scrim")){addMenu.classList.remove("open");if(window.scrim)scrim.classList.remove("open");}if(!e.target.closest(".bookMenu")&&!e.target.closest(".dots"))bookMenu.classList.remove("open")});
async function initApp(){
  data = (await loadBooks()).map(normalizeBook);
  render();
}
initApp();
</script>
